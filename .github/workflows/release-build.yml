name: Build And Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build and publish, for example 4.7.1-live.11592622"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: windows-latest

    env:
      BUILD_VERSION: ${{ github.event.inputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"
          cache-dependency-path: installer/requirements-build.txt

      - name: Build distribution packages
        shell: pwsh
        run: |
          python .\scripts\build_distributions.py --version "$env:BUILD_VERSION"

      - name: Create installer virtual environment
        shell: pwsh
        run: |
          python -m venv .installer-venv
          .\.installer-venv\Scripts\python.exe -m pip install --upgrade pip
          .\.installer-venv\Scripts\python.exe -m pip install -r .\installer\requirements-build.txt

      - name: Build installer executable
        shell: pwsh
        run: |
          .\.installer-venv\Scripts\python.exe .\scripts\build_installer.py --version "$env:BUILD_VERSION"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: star-citizen-localization-${{ env.BUILD_VERSION }}
          if-no-files-found: error
          path: |
            dist/${{ env.BUILD_VERSION }}/packages/*.zip
            dist/${{ env.BUILD_VERSION }}/reports/*
            dist-installer/StarCitizenLocalizationInstaller.exe

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BUILD_VERSION }}
          name: ${{ env.BUILD_VERSION }}
          body_path: dist/${{ env.BUILD_VERSION }}/reports/summary.txt
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            dist/${{ env.BUILD_VERSION }}/packages/*.zip
            dist/${{ env.BUILD_VERSION }}/reports/summary.txt
            dist-installer/StarCitizenLocalizationInstaller.exe
