name: Build And Release

on:
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build and publish, for example 4.7.1-live.11592622"
        required: false
        type: string
      english_global_ini:
        description: "Path to the extracted English global.ini committed in the repo"
        required: false
        default: "input/current/global.ini"
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.event.pull_request.merge_commit_sha || github.ref || github.run_id }}
  cancel-in-progress: false

jobs:
  build-release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.merged == true &&
        github.event.pull_request.base.ref == 'main' &&
        github.event.pull_request.head.ref == 'develop'
      )
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"
          cache-dependency-path: installer/requirements-build.txt

      - name: Resolve build version and inputs
        shell: pwsh
        run: |
          [Console]::InputEncoding = [System.Text.UTF8Encoding]::new($false)
          [Console]::OutputEncoding = [System.Text.UTF8Encoding]::new($false)
          $manualVersion = "${{ github.event.inputs.version }}"
          if ($manualVersion) {
            $version = $manualVersion.Trim()
          } else {
            if (-not (Test-Path ".\VERSION")) {
              Write-Error "Missing VERSION file in repository root. Commit it before triggering the release workflow."
            }
            $version = (Get-Content .\VERSION -Raw).Trim()
          }

          if (-not $version) {
            Write-Error "Resolved BUILD_VERSION is empty."
          }

          $englishGlobalIni = "${{ github.event.inputs.english_global_ini }}"
          if (-not $englishGlobalIni) {
            $englishGlobalIni = "input/current/global.ini"
          }

          "BUILD_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ENGLISH_GLOBAL_INI=$englishGlobalIni" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "INSTALLER_NAME=StarCitizenLocalizationInstaller-$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Check required English global.ini exists
        shell: pwsh
        run: |
          [Console]::InputEncoding = [System.Text.UTF8Encoding]::new($false)
          [Console]::OutputEncoding = [System.Text.UTF8Encoding]::new($false)
          if (-not (Test-Path "$env:ENGLISH_GLOBAL_INI")) {
            Write-Error "Missing required file '$env:ENGLISH_GLOBAL_INI' in the repository checkout. Extract it locally first and commit/push it before running this workflow."
          }

      - name: Build distribution packages
        shell: pwsh
        run: |
          [Console]::InputEncoding = [System.Text.UTF8Encoding]::new($false)
          [Console]::OutputEncoding = [System.Text.UTF8Encoding]::new($false)
          python .\scripts\build_distributions.py --english-global-ini "$env:ENGLISH_GLOBAL_INI" --version "$env:BUILD_VERSION"

      - name: Create installer virtual environment
        shell: pwsh
        run: |
          [Console]::InputEncoding = [System.Text.UTF8Encoding]::new($false)
          [Console]::OutputEncoding = [System.Text.UTF8Encoding]::new($false)
          python -m venv .installer-venv
          .\.installer-venv\Scripts\python.exe -m pip install --upgrade pip
          .\.installer-venv\Scripts\python.exe -m pip install -r .\installer\requirements-build.txt

      - name: Build installer executable
        shell: pwsh
        run: |
          [Console]::InputEncoding = [System.Text.UTF8Encoding]::new($false)
          [Console]::OutputEncoding = [System.Text.UTF8Encoding]::new($false)
          .\.installer-venv\Scripts\python.exe .\scripts\build_installer.py --version "$env:BUILD_VERSION" --name "$env:INSTALLER_NAME"

      - name: Generate release manifest
        shell: pwsh
        run: |
          [Console]::InputEncoding = [System.Text.UTF8Encoding]::new($false)
          [Console]::OutputEncoding = [System.Text.UTF8Encoding]::new($false)
          python .\scripts\generate_release_manifest.py --version "$env:BUILD_VERSION" --installer-path "dist-installer/$env:INSTALLER_NAME.exe"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: star-citizen-localization-${{ env.BUILD_VERSION }}
          if-no-files-found: error
          path: |
            dist/${{ env.BUILD_VERSION }}/packages/*.zip
            dist/${{ env.BUILD_VERSION }}/reports/*
            dist-installer/${{ env.INSTALLER_NAME }}.exe

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BUILD_VERSION }}
          name: ${{ env.BUILD_VERSION }}
          body_path: dist/${{ env.BUILD_VERSION }}/reports/summary.txt
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            dist/${{ env.BUILD_VERSION }}/packages/*.zip
            dist/${{ env.BUILD_VERSION }}/reports/manifest.json
            dist/${{ env.BUILD_VERSION }}/reports/summary.txt
            dist-installer/${{ env.INSTALLER_NAME }}.exe
